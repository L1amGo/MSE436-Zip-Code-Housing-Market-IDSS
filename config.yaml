# All tunable values for the pipeline live here — no URLs, column names,
# thresholds, or window sizes are hardcoded in Python.

sources:
  redfin:
    # Historical public S3 URL; confirmed live by T1 verify-schema.
    url: "https://redfin-public-data.s3.us-west-2.amazonaws.com/redfin_market_tracker/zip_code_market_tracker.tsv000.gz"
  zillow:
    # ZHVI, zip-level, smoothed + seasonally adjusted; confirmed by T1.
    url: "https://files.zillowstatic.com/research/public_csvs/zhvi/Zip_zhvi_uc_sfrcondo_tier_0.33_0.67_sm_sa_month.csv"
  fred:
    base_url: "https://api.stlouisfed.org/fred"
    series:
      - MORTGAGE30US
      - UNRATE
      - CPIAUCSL
      - HOUST

params:
  label_horizon_months: 3      # label = % change in median_sale_price at t+3
  holdout_months: 6            # test split = most recent 6 labeled months
  cv_gap_months: 3             # gap between CV train end and validation start
  train_window_months: 36      # max training window per CV fold
  low_volume_threshold: 10     # homes sold/month below this -> low_volume flag
  property_type: "All Residential"
  target_outlier_threshold: 0.50  # |target| above this -> target_outlier flag
  dev_metro_filter: []         # optional metro list to shrink data in dev; empty = all

paths:
  raw: data/raw
  interim: data/interim
  processed: data/processed

# Populated by T1 verify-schema: per-source logical -> actual column mapping,
# discovered from the live files. Do not hand-edit.
schema:
  redfin:
    columns:
      period_begin: PERIOD_BEGIN
      period_end: PERIOD_END
      region_zip: REGION
      property_type: PROPERTY_TYPE
      median_sale_price: MEDIAN_SALE_PRICE
      homes_sold: HOMES_SOLD
      inventory: INVENTORY
      new_listings: NEW_LISTINGS
      median_dom: MEDIAN_DOM
      avg_sale_to_list: AVG_SALE_TO_LIST
      sold_above_list: SOLD_ABOVE_LIST
      price_drops: PRICE_DROPS
  zillow:
    columns:
      region_zip: RegionName
    month_col_regex: ^\d{4}-\d{2}-\d{2}$
  fred:
    frequencies:
      MORTGAGE30US: W
      UNRATE: M
      CPIAUCSL: M
      HOUST: M
